<script>

        { name: '苏格兰', flag: '🏴󠁧󠁢󠁳󠁣󠁴󠁿', attack: 78, defense: 77, keeper: 76, overall: 77, tier: 'C' },
        { name: '加拿大', flag: '🇨🇦', attack: 77, defense: 75, keeper: 77, overall: 76, tier: 'C' },
        { name: '埃及', flag: '🇪🇬', attack: 76, defense: 74, keeper: 76, overall: 75, tier: 'C' },
        { name: '阿尔及利亚', flag: '🇩🇿', attack: 75, defense: 73, keeper: 74, overall: 74, tier: 'C' },
        { name: '厄瓜多尔', flag: '🇪🇨', attack: 74, defense: 72, keeper: 73, overall: 73, tier: 'C' },
        { name: '巴拉圭', flag: '🇵🇾', attack: 71, defense: 74, keeper: 72, overall: 72, tier: 'C' },
        { name: '加纳', flag: '🇬🇭', attack: 73, defense: 70, keeper: 70, overall: 71, tier: 'D' },
        { name: '澳大利亚', flag: '🇦🇺', attack: 71, defense: 70, keeper: 69, overall: 70, tier: 'D' },
        { name: '日本', flag: '🇯🇵', attack: 70, defense: 68, keeper: 70, overall: 69, tier: 'D' },
        { name: '韩国', flag: '🇰🇷', attack: 69, defense: 67, keeper: 69, overall: 68, tier: 'D' },
        { name: '南非', flag: '🇿🇦', attack: 65, defense: 67, keeper: 66, overall: 66, tier: 'D' },
        { name: '佛得角', flag: '🇨🇻', attack: 63, defense: 65, keeper: 64, overall: 64, tier: 'D' },
        { name: '约旦', flag: '🇯🇴', attack: 61, defense: 63, keeper: 62, overall: 62, tier: 'D' }
    ];

    let state = {
        balance: 1000,
        round: 1,
        maxRounds: 5,
        aliveTeams: [],
        matches: [],
        bets: [],
        gameOver: false,
        selectedMatchIdx: -1,
    };

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function poissonRandom(lambda) {
        if (lambda < 0) lambda = 0;
        let L = Math.exp(-lambda);
        let k = 0;
        let p = 1;
        do {
            k++;
            p *= Math.random();
        } while (p > L);
        return k - 1;
    }

    function simulateMatch(teamA, teamB) {
        const diff = teamA.overall - teamB.overall;
        let homeWinProb = 0.5 + diff * 0.004;
        homeWinProb = Math.min(Math.max(homeWinProb, 0.05), 0.95);
        const drawProb = 0.18 + Math.random() * 0.04;
        const rand = Math.random();
        let winner = 'draw';
        if (rand < homeWinProb) winner = 'home';
        else if (rand < homeWinProb + drawProb) winner = 'draw';
        else winner = 'away';

        let homeExpected = 1.2 + (teamA.attack/100 - teamB.defense/100) * 1.8 + (Math.random()-0.5)*0.4;
        let awayExpected = 1.0 + (teamB.attack/100 - teamA.defense/100) * 1.8 + (Math.random()-0.5)*0.4;
        homeExpected *= (1 - (teamB.keeper/100)*0.15);
        awayExpected *= (1 - (teamA.keeper/100)*0.15);
        homeExpected = Math.max(homeExpected, 0.2);
        awayExpected = Math.max(awayExpected, 0.2);

        let homeScore = poissonRandom(homeExpected);
        let awayScore = poissonRandom(awayExpected);

        if (winner === 'home' && homeScore <= awayScore) {
            homeScore = awayScore + Math.floor(Math.random()*2) + 1;
            awayScore = Math.max(0, awayScore - Math.floor(Math.random()*2));
        } else if (winner === 'away' && awayScore <= homeScore) {
            awayScore = homeScore + Math.floor(Math.random()*2) + 1;
            homeScore = Math.max(0, homeScore - Math.floor(Math.random()*2));
        } else if (winner === 'draw' && homeScore !== awayScore) {
            const avg = Math.floor((homeScore+awayScore)/2);
            homeScore = avg; awayScore = avg;
        }
        homeScore = Math.min(homeScore, 8);
        awayScore = Math.min(awayScore, 8);
        return { homeScore, awayScore, winner };
    }

    function computeOdds(teamA, teamB) {
        const diff = teamA.overall - teamB.overall;
        let homeWin = 0.5 + diff * 0.004;
        homeWin = Math.min(Math.max(homeWin, 0.05), 0.95);
        let draw = 0.18 + Math.random() * 0.04;
        let awayWin = 1 - homeWin - draw;
        if (awayWin < 0.02) { awayWin = 0.02; draw = 1 - homeWin - awayWin; }
        const margin = 0.90;
        return { home: margin/homeWin, draw: margin/draw, away: margin/awayWin };
    }

    function computeScoreOdds(teamA, teamB, h, a) {
        const base = 6.0 + Math.random() * 4;
        const diff = Math.abs(teamA.overall - teamB.overall);
        let factor = 1 + diff * 0.01;
        if (h === a) factor *= 1.2;
        if (h > 2 || a > 2) factor *= 1.3;
        return base * factor;
    }

    function computeTotalOdds(teamA, teamB) {
        const avg = (teamA.overall + teamB.overall) / 2;
        let overProb = 0.45 + (avg - 70) * 0.008;
        overProb = Math.min(Math.max(overProb, 0.25), 0.75);
        const margin = 0.90;
        return { over: margin/overProb, under: margin/(1-overProb) };
    }

    function getAIPrediction(teamA, teamB) {
        const diff = teamA.overall - teamB.overall;
        let homeWin = 0.5 + diff * 0.004;
        homeWin = Math.min(Math.max(homeWin, 0.05), 0.95);
        let draw = 0.18 + Math.random() * 0.02;
        let awayWin = 1 - homeWin - draw;
        if (awayWin < 0.02) { awayWin = 0.02; draw = 1 - homeWin - awayWin; }

        let homeExpected = 1.2 + (teamA.attack/100 - teamB.defense/100) * 1.8;
        let awayExpected = 1.0 + (teamB.attack/100 - teamA.defense/100) * 1.8;
        homeExpected *= (1 - (teamB.keeper/100)*0.15);
        awayExpected *= (1 - (teamA.keeper/100)*0.15);
        homeExpected = Math.max(homeExpected, 0.3);
        awayExpected = Math.max(awayExpected, 0.3);

        const mostLikely = [];
        for (let h = 0; h <= 4; h++) {
            for (let a = 0; a <= 4; a++) {
                const prob = (Math.pow(homeExpected, h) * Math.exp(-homeExpected) / factorial(h)) *
                             (Math.pow(awayExpected, a) * Math.exp(-awayExpected) / factorial(a));
                mostLikely.push({ h, a, prob });
            }
        }
        mostLikely.sort((x, y) => y.prob - x.prob);
        const topScores = mostLikely.slice(0, 3).map(s => `${s.h}:${s.a} (${(s.prob*100).toFixed(1)}%)`);

        let totalProb = 0;
        for (let h = 0; h <= 5; h++) {
            for (let a = 0; a <= 5; a++) {
                const prob = (Math.pow(homeExpected, h) * Math.exp(-homeExpected) / factorial(h)) *
                             (Math.pow(awayExpected, a) * Math.exp(-awayExpected) / factorial(a));
                if (h + a > 2.5) totalProb += prob;
            }
        }
        totalProb = Math.min(totalProb, 0.99);

        return {
            homeWin: homeWin,
            draw: draw,
            awayWin: awayWin,
            over: totalProb,
            under: 1 - totalProb,
            topScores: topScores
        };
    }

    function factorial(n) {
        if (n === 0) return 1;
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
    }

    function initGame() {
        state.balance = 1000;
        state.round = 1;
        state.gameOver = false;
        state.selectedMatchIdx = -1;
        state.bets = [];
        state.aliveTeams = TEAMS_DATA.map(t => ({ ...t }));
        shuffle(state.aliveTeams);
        generateRound();
        updateUI();
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('gameOverArea').classList.add('hidden');
        document.getElementById('infoMsg').textContent = '点击比赛卡片选择，然后下注';
        updateOddsPreview();
    }

    function generateRound() {
        const teams = state.aliveTeams;
        if (teams.length < 2) { endGame(); return; }
        shuffle(teams);
        const matches = [];
        for (let i = 0; i < teams.length - 1; i += 2) {
            matches.push({
                home: teams[i],
                away: teams[i+1],
                result: null,
                settled: false,
                aiResult: null,
            });
        }
        state.matches = matches;
        state.bets = [];
        state.selectedMatchIdx = (matches.length > 0) ? 0 : -1;
        document.getElementById('infoMsg').textContent = `第 ${state.round} 轮开始，请下注`;
        updateOddsPreview();
    }

    function getSelectedMatch() {
        if (state.selectedMatchIdx < 0 || state.selectedMatchIdx >= state.matches.length) return null;
        return state.matches[state.selectedMatchIdx];
    }

    function isMatchBetOn(matchIdx) {
        return state.bets.some(b => b.matchIdx === matchIdx);
    }

    function placeBet() {
        if (state.gameOver) { alert('游戏已结束'); return; }
        if (state.bets.length >= 4) { alert('本轮已下注4场，已达上限！'); return; }

        const match = getSelectedMatch();
        if (!match) { alert('请先点击一张比赛卡片选择对阵'); return; }
        if (match.settled) { alert('该场比赛已结束，无法下注'); return; }
        const idx = state.selectedMatchIdx;
        if (isMatchBetOn(idx)) { alert('本场比赛已下注，不能重复下注'); return; }

        const amount = parseInt(document.getElementById('betAmount').value);
        if (isNaN(amount) || amount < 10) { alert('下注金额至少为10'); return; }
        if (amount > 500) { alert('单注最大500'); return; }
        if (amount > state.balance) { alert('资金不足'); return; }

        const betType = document.getElementById('betType').value;
        let betOption = '';
        let odds = 0;

        if (betType === 'win') {
            const option = document.getElementById('betOptionWin').value;
            betOption = option;
            const oddsObj = computeOdds(match.home, match.away);
            odds = (option === 'home') ? oddsObj.home : (option === 'draw' ? oddsObj.draw : oddsObj.away);
        } else if (betType === 'score') {
            const h = parseInt(document.getElementById('scoreHome').value) || 0;
            const a = parseInt(document.getElementById('scoreAway').value) || 0;
            if (h < 0 || a < 0 || h > 8 || a > 8) { alert('比分范围0~8'); return; }
            betOption = `${h}:${a}`;
            odds = computeScoreOdds(match.home, match.away, h, a);
        } else if (betType === 'total') {
            const radios = document.querySelectorAll('input[name="total"]');
            let over = true;
            for (let r of radios) if (r.checked) over = (r.value === 'over');
            betOption = over ? '大球' : '小球';
            const totalOdds = computeTotalOdds(match.home, match.away);
            odds = over ? totalOdds.over : totalOdds.under;
        } else { alert('未知竞猜类型'); return; }

        state.balance -= amount;
        state.bets.push({ matchIdx: idx, betType, betOption, odds, amount });

        document.getElementById('infoMsg').textContent = `下注成功！已下注 ${state.bets.length}/4 场`;
        updateUI();
        updateOddsPreview();
    }

    function useAI(matchIdx) {
        if (state.gameOver) return;
        const match = state.matches[matchIdx];
        if (!match) return;
        if (match.settled) { alert('比赛已结束'); return; }
        if (state.balance < 200) { alert('资金不足200，无法使用AI模拟'); return; }
        if (!confirm('使用AI模拟预测本场比赛，消耗200资金，确认？')) return;

        state.balance -= 200;
        const pred = getAIPrediction(match.home, match.away);
        match.aiResult = pred;
        updateUI();
        document.getElementById('infoMsg').textContent = 'AI模拟完成，查看卡片下方预测结果';
    }

    function doWork() {
        if (state.gameOver) return;
        if (state.bets.length > 0) {
            alert('本轮已下注，无法打工。请先结算或放弃下注。');
            return;
        }
        if (!confirm('确认打工跳过本轮？你将获得100资金，本轮比赛将自动模拟晋级。')) return;
        state.matches.forEach(m => {
            if (!m.settled) {
                m.result = simulateMatch(m.home, m.away);
                m.settled = true;
            }
        });
        advanceRound();
        state.balance += 100;
        if (state.aliveTeams.length <= 1 || state.round >= state.maxRounds) {
            endGame();
            return;
        }
        state.round++;
        generateRound();
        document.getElementById('resultArea').classList.add('hidden');
        updateUI();
        document.getElementById('infoMsg').textContent = '打工成功，资金+100，进入第 ' + state.round + ' 轮';
    }

    function settleRound() {
        if (state.gameOver) return;
        if (state.matches.length === 0) return;

        state.matches.forEach(m => {
            if (!m.settled) {
                m.result = simulateMatch(m.home, m.away);
                m.settled = true;
            }
        });

        let resultsHTML = '';
        if (state.bets.length === 0) {
            resultsHTML = '<div>本轮无投注</div>';
        } else {
            state.bets.forEach(bet => {
                const match = state.matches[bet.matchIdx];
                const res = match.result;
                let win = false;
                let winAmount = 0;

                if (bet.betType === 'win') {
                    let winner = '';
                    if (res.winner === 'home') winner = 'home';
                    else if (res.winner === 'away') winner = 'away';
                    else winner = 'draw';
                    if (bet.betOption === winner) win = true;
                } else if (bet.betType === 'score') {
                    const parts = bet.betOption.split(':');
                    if (res.homeScore === parseInt(parts[0]) && res.awayScore === parseInt(parts[1])) win = true;
                } else if (bet.betType === 'total') {
                    const total = res.homeScore + res.awayScore;
                    const over = total > 2.5;
                    if ((bet.betOption === '大球' && over) || (bet.betOption === '小球' && !over)) win = true;
                }

                if (win) {
                    winAmount = Math.round(bet.amount * bet.odds);
                    state.balance += winAmount;
                }

                resultsHTML += '<div class="result-item"><strong>' + match.home.name + ' ' + res.homeScore + ' : ' + res.awayScore + ' ' + match.away.name + '</strong> | 下注 ' + bet.amount + ' 资金 (' + bet.betType + ' ' + bet.betOption + ') 赔率 ' + bet.odds.toFixed(2) + ' → ' + (win ? '✅ 中奖 +' + winAmount : '❌ 未中') + '</div>';
            });
        }

        const area = document.getElementById('resultArea');
        area.classList.remove('hidden');
        document.getElementById('resultContent').innerHTML = resultsHTML;

        state.bets = [];
        advanceRound();

        if (state.aliveTeams.length <= 1 || state.round >= state.maxRounds) {
            endGame();
            return;
        }
        state.round++;
        generateRound();
        updateUI();
        document.getElementById('infoMsg').textContent = '第 ' + state.round + ' 轮开始！';
    }

    function advanceRound() {
        const winners = [];
        state.matches.forEach(match => {
            if (!match.result) return;
            const res = match.result;
            if (res.winner === 'home') winners.push(match.home);
            else if (res.winner === 'away') winners.push(match.away);
            else winners.push(Math.random() < 0.5 ? match.home : match.away);
        });
        state.aliveTeams = winners;
    }

    function nextRound() {
        if (state.gameOver) return;
        const allSettled = state.matches.every(m => m.settled);
        if (allSettled && state.matches.length > 0) {
            if (state.aliveTeams.length <= 1) { endGame(); return; }
            state.round++;
            if (state.round > state.maxRounds) { endGame(); return; }
            generateRound();
            updateUI();
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('infoMsg').textContent = '第 ' + state.round + ' 轮开始！';
            return;
        }

        if (!confirm('确认进入下一轮？当前轮次所有未结算比赛将自动模拟并开奖！')) return;
        settleRound();
    }

    function endGame() {
        state.gameOver = true;
        document.getElementById('gameOverArea').classList.remove('hidden');
        document.getElementById('finalBalance').textContent = state.balance;
        document.getElementById('infoMsg').textContent = '🏁 游戏结束！';
        document.getElementById('roundTitle').textContent = '🏆 比赛结束';
        document.getElementById('matchContainer').innerHTML = '';
        document.getElementById('nextRoundBtn').disabled = true;
        document.getElementById('workBtn').disabled = true;
        updateLeaderboard();
    }

    function updateOddsPreview() {
        const match = getSelectedMatch();
        const preview = document.getElementById('oddsPreview');
        if (!match) { preview.textContent = '请选择比赛'; return; }
        const betType = document.getElementById('betType').value;
        let odds = 0;
        if (betType === 'win') {
            const option = document.getElementById('betOptionWin').value;
            const o = computeOdds(match.home, match.away);
            odds = (option === 'home') ? o.home : (option === 'draw' ? o.draw : o.away);
        } else if (betType === 'score') {
            const h = parseInt(document.getElementById('scoreHome').value) || 0;
            const a = parseInt(document.getElementById('scoreAway').value) || 0;
            odds = computeScoreOdds(match.home, match.away, h, a);
        } else if (betType === 'total') {
            const radios = document.querySelectorAll('input[name="total"]');
            let over = true;
            for (let r of radios) if (r.checked) over = (r.value === 'over');
            const o = computeTotalOdds(match.home, match.away);
            odds = over ? o.over : o.under;
        }
        preview.textContent = '赔率: ' + odds.toFixed(2);
    }

    function updateUI() {
        document.getElementById('balanceDisplay').textContent = state.balance;
        document.getElementById('roundDisplay').textContent = state.round + ' / ' + state.maxRounds;
        document.getElementById('survivorCount').textContent = state.aliveTeams.length;
        document.getElementById('betCountDisplay').textContent = state.bets.length + ' / 4';
        document.getElementById('roundTitle').textContent = '🏟️ 第' + state.round + '轮 · ' + state.aliveTeams.length + '强';

        const container = document.getElementById('matchContainer');
        container.innerHTML = '';

        state.matches.forEach((match, idx) => {
            const card = document.createElement('div');
            card.className = 'match-card';
            const isSelected = (idx === state.selectedMatchIdx);
            const isBetOn = isMatchBetOn(idx);
            const isSettled = match.settled;

            if (isSelected) card.classList.add('selected');
            if (isBetOn && !isSettled) card.classList.add('betting');
            if (isSettled) card.classList.add('settled');

            const teamsDiv = document.createElement('div');
            teamsDiv.className = 'match-teams';
            teamsDiv.innerHTML = '<span class="team-badge"><span class="home-away-tag">🏠主</span><span class="team-flag">' + match.home.flag + '</span> ' + match.home.name + ' <span class="team-strength">' + match.home.overall + '</span></span><span class="vs">vs</span><span class="team-badge"><span class="home-away-tag away">✈️客</span><span class="team-flag">' + match.away.flag + '</span> ' + match.away.name + ' <span class="team-strength">' + match.away.overall + '</span></span>' + (isSelected ? ' 🔍已选中' : '') + (isBetOn ? ' 📝已下注' : '') + (isSettled ? ' ⏳已结算' : '');
            card.appendChild(teamsDiv);

            const detail = document.createElement('div');
            detail.className = 'match-detail';
            detail.innerHTML = '<div class="stat"><span>⚔️ 进攻</span> <span>' + match.home.attack + ' - ' + match.away.attack + '</span></div><div class="stat"><span>🛡️ 防守</span> <span>' + match.home.defense + ' - ' + match.away.defense + '</span></div><div class="stat"><span>🧤 门将</span> <span>' + match.home.keeper + ' - ' + match.away.keeper + '</span></div><div class="stat"><span>⭐ 档次</span> <span>' + match.home.tier + ' - ' + match.away.tier + '</span></div>';
            card.appendChild(detail);

            const odds = computeOdds(match.home, match.away);
            const oddsDiv = document.createElement('div');
            oddsDiv.className = 'match-odds';
            oddsDiv.innerHTML = '<span>🏠主胜 ' + odds.home.toFixed(2) + '</span><span>🤝平局 ' + odds.draw.toFixed(2) + '</span><span>✈️客胜 ' + odds.away.toFixed(2) + '</span>';
            card.appendChild(oddsDiv);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'match-actions';
            const aiBtn = document.createElement('button');
            aiBtn.className = 'ai-btn';
            aiBtn.textContent = '🧠 AI模拟';
            aiBtn.disabled = (isSettled || state.gameOver);
            aiBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                useAI(idx);
            });
            actionsDiv.appendChild(aiBtn);
            card.appendChild(actionsDiv);

            const aiResultDiv = document.createElement('div');
            aiResultDiv.className = 'ai-result';
            if (match.aiResult) {
                const p = match.aiResult;
                aiResultDiv.innerHTML = '<strong>AI预测</strong><br>主胜 ' + (p.homeWin*100).toFixed(1) + '% | 平局 ' + (p.draw*100).toFixed(1) + '% | 客胜 ' + (p.awayWin*100).toFixed(1) + '%<br>大球 ' + (p.over*100).toFixed(1) + '% | 小球 ' + (p.under*100).toFixed(1) + '%<br>最可能比分: ' + p.topScores.join(' | ');
                aiResultDiv.classList.add('show');
            }
            card.appendChild(aiResultDiv);

            if (isSettled && match.result) {
                const res = match.result;
                const resDiv = document.createElement('div');
                resDiv.className = 'bet-status';
                resDiv.innerHTML = '🏁 比分 ' + res.homeScore + ' : ' + res.awayScore + ' (' + (res.winner === 'home' ? '主胜' : res.winner === 'away' ? '客胜' : '平局') + ')';
                card.appendChild(resDiv);
            }

            card.addEventListener('click', function(e) {
                if (state.gameOver) return;
                if (isSettled) { alert('该场比赛已结算'); return; }
                state.selectedMatchIdx = idx;
                updateUI();
                updateOddsPreview();
                document.getElementById('betStatus').textContent = '已选 ' + match.home.name + ' vs ' + match.away.name;
            });

            container.appendChild(card);
        });

        if (state.matches.length === 0 && !state.gameOver) {
            container.innerHTML = '<div class="text-center text-sm" style="padding:20px;">暂无比赛</div>';
        }

        const workBtn = document.getElementById('workBtn');
        if (state.gameOver || state.bets.length > 0) {
            workBtn.disabled = true;
        } else {
            workBtn.disabled = false;
        }

        const nextBtn = document.getElementById('nextRoundBtn');
        if (state.gameOver) {
            nextBtn.disabled = true;
        } else {
            nextBtn.disabled = false;
        }
    }

    function getLeaderboard() {
        const data = localStorage.getItem('footballGuessLeaderboard');
        return data ? JSON.parse(data) : [];
    }
    function saveLeaderboard(entries) {
        localStorage.setItem('footballGuessLeaderboard', JSON.stringify(entries));
    }
    function addScore(name, score) {
        if (!name.trim()) name = '匿名玩家';
        const board = getLeaderboard();
        board.push({ name: name.trim(), score: score, date: new Date().toLocaleString() });
        board.sort((a,b) => b.score - a.score);
        if (board.length > 20) board.length = 20;
        saveLeaderboard(board);
        updateLeaderboard();
    }
    function updateLeaderboard() {
        const list = document.getElementById('leaderboardList');
        const board = getLeaderboard();
        if (board.length === 0) {
            list.innerHTML = '<li style="color:#94a3b8;justify-content:center;">暂无记录</li>';
            return;
        }
        list.innerHTML = board.map((item, i) => '<li><span>' + (i+1) + '. ' + item.name + '</span> <span>' + item.score + ' 资金</span></li>').join('');
    }

    document.addEventListener('DOMContentLoaded', function() {
        initGame();
        updateLeaderboard();

        document.getElementById('betType').addEventListener('change', function() {
            const type = this.value;
            document.getElementById('winOptions').style.display = (type === 'win') ? 'inline' : 'none';
            document.getElementById('scoreOptions').style.display = (type === 'score') ? 'inline' : 'none';
            document.getElementById('totalOptions').style.display = (type === 'total') ? 'inline' : 'none';
            updateOddsPreview();
        });

        document.getElementById('scoreHome').addEventListener('input', updateOddsPreview);
        document.getElementById('scoreAway').addEventListener('input', updateOddsPreview);
        document.querySelectorAll('input[name="total"]').forEach(el => {
            el.addEventListener('change', updateOddsPreview);
        });
        document.getElementById('betOptionWin').addEventListener('change', updateOddsPreview);

        document.getElementById('placeBetBtn').addEventListener('click', placeBet);
        document.getElementById('nextRoundBtn').addEventListener('click', nextRound);
        document.getElementById('workBtn').addEventListener('click', doWork);

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('重新开始游戏？当前进度将丢失。')) {
                initGame();
                document.getElementById('gameOverArea').classList.add('hidden');
                document.getElementById('resultArea').classList.add('hidden');
                document.getElementById('nextRoundBtn').disabled = false;
                document.getElementById('workBtn').disabled = false;
                updateLeaderboard();
            }
        });

        document.getElementById('saveScoreBtn').addEventListener('click', function() {
            const name = document.getElementById('playerNameInput').value.trim() || '匿名';
            addScore(name, state.balance);
            alert('成绩已保存！');
        });

        document.getElementById('showLeaderboardBtn').addEventListener('click', function() {
            updateLeaderboard();
            document.getElementById('leaderboardArea').scrollIntoView({ behavior: 'smooth' });
        });

        updateOddsPreview();
    });
</script>
</body>
</html>
